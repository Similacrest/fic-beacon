<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fic Beacon{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 1em 1.5em;
      color: #222;
      background: #fafafa;
    }
    nav { display: flex; gap: 1.5em; padding: .75em 0; border-bottom: 1px solid #ddd; margin-bottom: 1.5em; }
    nav a { text-decoration: none; color: #555; font-weight: 500; }
    nav a:hover { color: #000; }
    h1 { font-size: 1.5em; margin: 0 0 1em; }
    h2 { font-size: 1.2em; margin: 1.5em 0 .5em; color: #444; }
    table { width: 100%; border-collapse: collapse; font-size: .95em; }
    th, td { text-align: left; padding: .4em .7em; border-bottom: 1px solid #eee; }
    th { background: #f0f0f0; font-weight: 600; }
    .badge {
      display: inline-block;
      padding: .15em .5em;
      border-radius: 3px;
      font-size: .8em;
      font-weight: 600;
    }
    .badge-active   { background: #d4edda; color: #155724; }
    .badge-queued   { background: #fff3cd; color: #856404; }
    .badge-completed{ background: #cce5ff; color: #004085; }
    .badge-dropped  { background: #f8d7da; color: #721c24; }
    button, .btn {
      padding: .3em .9em;
      border: 1px solid #aaa;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: .9em;
    }
    button:hover, .btn:hover { background: #f0f0f0; }
    .btn-primary { background: #0d6efd; color: #fff; border-color: #0d6efd; }
    .btn-primary:hover { background: #0b5ed7; }
    .btn-danger  { background: #dc3545; color: #fff; border-color: #dc3545; }
    .btn-danger:hover { background: #bb2d3b; }
    label { display: block; margin-bottom: .25em; font-weight: 500; }
    input[type=text], input[type=number], select {
      width: 100%; padding: .4em .6em; border: 1px solid #ccc; border-radius: 4px;
      font-size: 1em;
    }
    .form-group { margin-bottom: 1em; }
    .feed-url {
      font-family: monospace;
      font-size: .85em;
      background: #f0f0f0;
      padding: .4em .6em;
      border-radius: 4px;
      word-break: break-all;
    }
    .progress-bar-wrap { background: #e9ecef; border-radius: 4px; height: 8px; width: 120px; display: inline-block; vertical-align: middle; }
    .progress-bar-fill { display: block; background: #0d6efd; height: 100%; border-radius: 4px; }
    details.section { border: 1px solid #e3e3e3; border-radius: 6px; background: #fff; margin: .8em 0; padding: 0 1em; }
    details.section > summary {
      cursor: pointer; font-size: 1.1em; font-weight: 600; color: #444;
      padding: .7em 0; list-style: none; user-select: none;
    }
    details.section > summary::-webkit-details-marker { display: none; }
    details.section > summary::before { content: "▸"; display: inline-block; width: 1.1em; color: #999; }
    details.section[open] > summary::before { content: "▾"; }
    details.section > summary .count { color: #999; font-weight: 400; font-size: .85em; }
    details.section > :not(summary):last-child { margin-bottom: 1em; }
    .slot-card { border: 1px solid #eee; border-radius: 6px; padding: .6em .8em; margin: .5em 0; background: #fcfcfc; }
    .slot-card h4 { margin: 0 0 .4em; font-size: 1em; }
    .pill { display:inline-block; padding:.1em .5em; border-radius:10px; font-size:.78em; background:#eef; color:#335; margin-right:.3em; }
    .pill-epub { background:#e7f1ff; color:#0b5394; }
    .pill-ongoing { background:#e6f4ea; color:#1e7e34; }
    .muted { color:#999; }
    .kv { display:grid; grid-template-columns:max-content 1fr; gap:.2em 1em; font-size:.9em; }
    /* Brief confirmation that an auto-saving field (cursor/weight) was persisted. */
    input.autosave { transition: background-color .2s, box-shadow .2s; }
    input.autosave.saved-flash { background-color: #e6f4ea; box-shadow: 0 0 0 2px #b7e1c4; }
  </style>
</head>
<body>
  <nav>
    <strong>📡 Fic Beacon</strong>
    <a href="/admin/">Dashboard</a>
    <a href="/admin/channels">Channels</a>
    <a href="/admin/library">Library</a>
    <a href="/admin/ongoing/">Tracked Stories</a>
    <a href="/admin/config">Settings</a>
    <span style="margin-left:auto; color:#aaa; font-size:.8em">v{{ version }}</span>
  </nav>
  {% block content %}{% endblock %}
  <footer style="margin-top:2em; padding-top:.75em; border-top:1px solid #eee; color:#aaa; font-size:.8em">
    Fic Beacon {{ version }}
  </footer>
</body>
</html>
