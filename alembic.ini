# Alembic configuration for Fic-Beacon.
#
# The database URL is NOT set here — alembic/env.py reads it from app settings
# (BEACON_DATABASE_URL / the same default as the running app) so migrations and the
# app can never disagree about which DB they target.
[alembic]
script_location = alembic
prepend_sys_path = .
# Revision filenames are date-prefixed for readable ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
