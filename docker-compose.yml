services:
  beacon:
    build: .
    restart: unless-stopped
    ports:
      - "${BEACON_PORT:-8000}:8000"
    volumes:
      # App state (SQLite DB)
      - beacon-data:/data
      # Calibre library: mount your library folder as read-only
      # Set CALIBRE_LIBRARY_PATH env var to your Calibre library path
      - ${CALIBRE_LIBRARY_PATH:-.}:/calibre-library:ro
    environment:
      BEACON_BASE_URL: "${BEACON_BASE_URL:-http://localhost:8000}"
      BEACON_CALIBRE_LIBRARY_PATH: "/calibre-library"
      BEACON_DATABASE_URL: "sqlite:////data/fic-beacon.db"
      # Generate a secret: python -c "import secrets; print(secrets.token_urlsafe(32))"
      # BEACON_FEED_SECRET: "${BEACON_FEED_SECRET:}"

volumes:
  beacon-data:
